<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smilecloud 微笑雲朵 | 蕭宇超醫師</title>
  
  <!-- 載入 Tailwind CSS 來處理雲朵天空藍的美編 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 Babel 讓瀏覽器能直接看懂 React 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans selection:bg-sky-200">
  
  <!-- 網頁的內容會被放到這個 root 裡面 -->
  <div id="root"></div>

  <!-- 這裡就是原本的 React 程式碼 -->
  <script type="text/babel" data-type="module">
    import React, { useState } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { Cloud, Activity, BookOpen, Calendar, MapPin, ArrowRight, Menu, X, ChevronRight, Heart } from 'https://esm.sh/lucide-react@0.292.0';

    // 模擬未來的衛教文章資料庫
    const mockArticles = [
      {
        id: 1,
        title: '便利商店早餐怎麼挑？避開地雷組合',
        date: '2026-03-15',
        summary: '早上趕時間只能吃便利商店？教你用「碳水+蛋白質」的口訣，幫孩子挑出有飽足感又不會血糖亂飆的健康早餐。',
        category: '飲食營養'
      },
      {
        id: 2,
        title: '孩子不愛動怎麼辦？3個遊戲化小技巧',
        date: '2026-03-02',
        summary: '逼孩子去跑步只會造成反效果。試著把運動變成破關任務，或是利用家裡的枕頭和紙箱，把客廳變成體能訓練場！',
        category: '運動培養'
      },
      {
        id: 3,
        title: '認識紅黃綠燈食物：寫給家長的採買指南',
        date: '2026-02-18',
        summary: '不是所有零食都不能吃！帶你看懂食品標示，學會分辨哪些是能天天吃的綠燈食物，哪些是偶爾解饞的紅燈食物。',
        category: '飲食營養'
      }
    ];

    // 模擬演講紀錄
    const mockLectures = [
      { id: 1, school: '旗山國小', date: '2025-10', topic: '兒童健康體位宣導與實作' },
      { id: 2, school: '富里國中', date: '2025-11', topic: '青春期營養與運動處方' },
      { id: 3, school: '高雄市立圖書館', date: '2026-01', topic: '親子健康飲食講座' }
    ];

    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

      // 導覽列組件
      const Navbar = () => (
        <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-sky-100">
          <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex justify-between h-20">
              <div className="flex items-center cursor-pointer" onClick={() => setCurrentPage('home')}>
                <div className="bg-sky-400 p-2 rounded-2xl mr-3">
                  <Cloud className="text-white h-6 w-6" strokeWidth={2.5} />
                </div>
                <span className="text-2xl font-bold text-sky-600 tracking-wider">Smilecloud</span>
              </div>
              
              <div className="hidden md:flex items-center space-x-8">
                <button onClick={() => setCurrentPage('home')} className="text-slate-600 hover:text-sky-500 font-medium transition-colors">首頁</button>
                <button onClick={() => setCurrentPage('blog')} className="text-slate-600 hover:text-sky-500 font-medium transition-colors">衛教小學堂</button>
                <a href="#lectures" onClick={(e) => { if(currentPage !== 'home') { setCurrentPage('home'); } }} className="text-slate-600 hover:text-sky-500 font-medium transition-colors">活動足跡</a>
                <a href="https://docs.google.com/forms" target="_blank" rel="noreferrer" className="bg-sky-400 hover:bg-sky-500 text-white px-6 py-2.5 rounded-full font-bold transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                  預約演講
                </a>
              </div>

              <div className="md:hidden flex items-center">
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="text-slate-600">
                  {isMobileMenuOpen ? <X className="h-6 w-6" /> : <Menu className="h-6 w-6" />}
                </button>
              </div>
            </div>
          </div>

          {isMobileMenuOpen && (
            <div className="md:hidden bg-white border-t border-sky-50 px-4 pt-2 pb-4 space-y-2 shadow-lg">
              <button onClick={() => { setCurrentPage('home'); setIsMobileMenuOpen(false); }} className="block w-full text-left px-3 py-2 text-slate-600 font-medium">首頁</button>
              <button onClick={() => { setCurrentPage('blog'); setIsMobileMenuOpen(false); }} className="block w-full text-left px-3 py-2 text-slate-600 font-medium">衛教小學堂</button>
              <a href="https://docs.google.com/forms" className="block w-full text-center mt-4 bg-sky-400 text-white px-3 py-3 rounded-xl font-bold">預約演講</a>
            </div>
          )}
        </nav>
      );

      // 首頁內容
      const HomeContent = () => (
        <div className="animate-in fade-in duration-500">
          <section className="relative pt-20 pb-32 overflow-hidden">
            <div className="absolute inset-0 bg-gradient-to-b from-sky-50 to-slate-50 z-0"></div>
            <div className="absolute top-20 left-10 text-sky-100 opacity-50"><Cloud size={120} /></div>
            <div className="absolute top-40 right-20 text-sky-100 opacity-60"><Cloud size={80} /></div>
            
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
              <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-sky-100 text-sky-700 font-semibold mb-8 text-sm">
                <Heart size={16} className="text-sky-500" />
                <span>蕭宇超醫師的兒童健康冒險島</span>
              </div>
              <h1 className="text-5xl md:text-6xl font-extrabold text-slate-800 mb-6 leading-tight">
                讓健康變得好玩，<br/>
                <span className="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-sky-600">陪孩子輕盈成長</span>
              </h1>
              <p className="text-xl text-slate-600 mb-10 max-w-2xl mx-auto leading-relaxed">
                我們不只是在談體重，更是在打造一個讓孩子愛上運動與營養的奇幻世界。透過趣味互動與專業指引，讓健康習慣自然養成。
              </p>
              <div className="flex flex-col sm:flex-row justify-center gap-4">
                <button onClick={() => setCurrentPage('blog')} className="bg-amber-400 hover:bg-amber-500 text-slate-900 px-8 py-4 rounded-full font-bold text-lg transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1 flex items-center justify-center gap-2">
                  <BookOpen size={20} />
                  閱讀衛教文章
                </button>
                <a href="#features" className="bg-white hover:bg-sky-50 text-sky-600 border-2 border-sky-100 px-8 py-4 rounded-full font-bold text-lg transition-all flex items-center justify-center gap-2">
                  探索互動工具
                </a>
              </div>
            </div>
          </section>

          <section id="features" className="py-20 bg-slate-50">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-16">
                <h2 className="text-3xl md:text-4xl font-bold text-slate-800 mb-4">專業與趣味結合的數位教具</h2>
                <div className="w-20 h-1.5 bg-sky-400 mx-auto rounded-full"></div>
              </div>

              <div className="grid md:grid-cols-3 gap-8">
                <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 hover:shadow-xl hover:border-sky-200 transition-all group flex flex-col h-full">
                  <div className="bg-sky-100 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                    <Cloud className="text-sky-500 h-8 w-8" />
                  </div>
                  <h3 className="text-2xl font-bold text-slate-800 mb-4">健康冒險島</h3>
                  <p className="text-slate-600 mb-8 flex-grow leading-relaxed">
                    化身雲朵勇士！用 12 個闖關小遊戲帶孩子解開身體密碼，在跑酷與挑戰中學會分辨食物紅綠燈。
                  </p>
                  <a href="https://smilecloud.tw/for_healthy_children/" target="_blank" rel="noreferrer" className="inline-flex items-center text-sky-600 font-bold hover:text-sky-700">
                    立即登島挑戰 <ArrowRight className="ml-2 h-5 w-5" />
                  </a>
                </div>

                <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 hover:shadow-xl hover:border-sky-200 transition-all group flex flex-col h-full">
                  <div className="bg-amber-100 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                    <Activity className="text-amber-500 h-8 w-8" />
                  </div>
                  <h3 className="text-2xl font-bold text-slate-800 mb-4">運動專屬處方</h3>
                  <p className="text-slate-600 mb-8 flex-grow leading-relaxed">
                    不知道怎麼陪孩子運動？輸入基本資料，讓超級電腦為你開立專屬的階段性運動計畫。
                  </p>
                  <a href="https://smilecloud.tw/gogoexercise/" target="_blank" rel="noreferrer" className="inline-flex items-center text-sky-600 font-bold hover:text-sky-700">
                    領取專屬處方 <ArrowRight className="ml-2 h-5 w-5" />
                  </a>
                </div>

                <div className="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 hover:shadow-xl hover:border-sky-200 transition-all group flex flex-col h-full">
                  <div className="bg-green-100 w-16 h-16 rounded-2xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                    <BookOpen className="text-green-500 h-8 w-8" />
                  </div>
                  <h3 className="text-2xl font-bold text-slate-800 mb-4">衛教小學堂</h3>
                  <p className="text-slate-600 mb-8 flex-grow leading-relaxed">
                    沒有生硬的醫學名詞，只有好懂、能立刻執行的實戰策略。解決家長最頭痛的日常飲食難題。
                  </p>
                  <button onClick={() => setCurrentPage('blog')} className="inline-flex items-center text-sky-600 font-bold hover:text-sky-700 text-left">
                    閱讀最新文章 <ArrowRight className="ml-2 h-5 w-5" />
                  </button>
                </div>
              </div>
            </div>
          </section>

          <section id="lectures" className="py-20 bg-white">
            <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
                <div>
                  <h2 className="text-3xl font-bold text-slate-800 mb-4">活動與校園足跡</h2>
                  <p className="text-slate-600">把健康觀念帶進校園，讓專業知識成為老師與家長的神隊友。</p>
                </div>
                <a href="https://docs.google.com/forms" target="_blank" rel="noreferrer" className="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-xl font-bold transition-colors inline-flex items-center justify-center gap-2">
                  <Calendar size={18} /> 邀約演講合作
                </a>
              </div>

              <div className="bg-slate-50 rounded-3xl p-6 md:p-10 border border-slate-100">
                <div className="space-y-6">
                  {mockLectures.map((lecture) => (
                    <div key={lecture.id} className="flex flex-col sm:flex-row sm:items-center p-4 bg-white rounded-2xl shadow-sm hover:shadow-md transition-shadow border border-slate-50">
                      <div className="flex items-center gap-2 text-sky-500 font-bold min-w-[120px] mb-2 sm:mb-0">
                        <Calendar size={16} />
                        <span>{lecture.date}</span>
                      </div>
                      <div className="flex items-center gap-2 text-slate-700 font-bold min-w-[180px] mb-2 sm:mb-0">
                        <MapPin size={16} className="text-amber-400" />
                        <span>{lecture.school}</span>
                      </div>
                      <div className="text-slate-600 flex-grow">
                        {lecture.topic}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </section>
        </div>
      );

      // 衛教文章列表頁面
      const BlogContent = () => (
        <div className="animate-in fade-in duration-500 min-h-screen bg-slate-50 py-12">
          <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="mb-12">
              <button onClick={() => setCurrentPage('home')} className="text-sky-500 hover:text-sky-700 font-medium mb-6 inline-flex items-center">
                <ArrowRight className="mr-2 h-4 w-4 rotate-180" /> 回首頁
              </button>
              <h1 className="text-4xl font-bold text-slate-800 mb-4">衛教小學堂</h1>
              <p className="text-xl text-slate-600">寫給家長的實戰指南，輕鬆看懂兒童營養與成長密碼。</p>
            </div>

            <div className="space-y-8">
              {mockArticles.map((article) => (
                <article key={article.id} className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow cursor-pointer group">
                  <div className="flex items-center gap-4 mb-4">
                    <span className="bg-sky-100 text-sky-700 px-3 py-1 rounded-full text-sm font-bold">
                      {article.category}
                    </span>
                    <span className="text-slate-400 text-sm font-medium">{article.date}</span>
                  </div>
                  <h2 className="text-2xl font-bold text-slate-800 mb-3 group-hover:text-sky-600 transition-colors">
                    {article.title}
                  </h2>
                  <p className="text-slate-600 leading-relaxed mb-6">
                    {article.summary}
                  </p>
                  <div className="text-sky-500 font-bold flex items-center">
                    繼續閱讀 <ChevronRight className="ml-1 h-5 w-5 group-hover:translate-x-1 transition-transform" />
                  </div>
                </article>
              ))}
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50 font-sans selection:bg-sky-200 flex flex-col">
          <Navbar />
          <div className="flex-grow">
            {currentPage === 'home' ? <HomeContent /> : <BlogContent />}
          </div>
          <footer className="bg-slate-900 text-slate-400 py-12 text-center">
            <div className="max-w-6xl mx-auto px-4">
              <div className="flex items-center justify-center gap-2 mb-6 text-white text-xl font-bold">
                <Cloud className="text-sky-400" /> Smilecloud
              </div>
              <p className="mb-6">讓專業知識走進家庭，陪伴孩子健康成長。</p>
              <div className="text-sm">
                © 2026 蕭宇超醫師. All rights reserved.
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // 啟動 React 應用程式
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
